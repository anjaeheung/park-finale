<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>엔딩 분기</title>
<style>
  :root{
    --bg:#0c0e13; --panel:#151823; --line:#2a3040; --ink:#e9ecf2; --muted:#8b93a6;
    --gold:#ffd54a; --a:#ff6b6b; --b:#7fd6a0; --c:#b88cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(130% 100% at 50% 0%,#171b27 0%,var(--bg) 60%);
    color:var(--ink);
    font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;height:100%;overflow:hidden;
  }
  #top{width:100%;max-width:720px;padding:12px 18px 8px;text-align:center}
  #top h1{margin:0;font-size:16px;letter-spacing:3px;color:#dfe3ea;font-weight:700}
  #stage{width:100%;max-width:720px;flex:1;display:flex;flex-direction:column;
         min-height:0;padding:0 14px 10px;cursor:pointer}
  #log{flex:1;overflow-y:auto;padding:10px 4px 6px;display:flex;flex-direction:column;gap:12px;
       scroll-behavior:smooth}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .narr{align-self:stretch;padding:4px 6px 4px 16px;border-left:3px solid rgba(139,147,166,.5);
        color:#c6cdda;line-height:1.75;font-size:15px;white-space:pre-wrap;animation:rise .22s ease}
  .rules{align-self:stretch;background:#141a26;border:1px solid #2e3a50;border-radius:12px;
         padding:14px 18px;line-height:1.8;font-size:13.5px;color:#cfd6e4;white-space:pre-wrap;animation:rise .22s ease}
  .rules .rtag{display:block;font-size:13px;font-weight:800;color:var(--gold);margin-bottom:8px;letter-spacing:1px}
  .branch{align-self:stretch;display:flex;flex-direction:column;gap:8px;animation:rise .22s ease}
  .brow{border:1px solid var(--line);border-left-width:4px;border-radius:11px;padding:11px 15px;background:#141823}
  .brow .bt{font-size:14px;font-weight:800;margin-bottom:2px}
  .brow .bd{font-size:13px;color:#cdd3df;line-height:1.6}
  .brow .note{font-size:11.5px;color:var(--muted);margin-top:3px}
  .brow.A{border-left-color:var(--a)} .brow.A .bt{color:var(--a)}
  .brow.B{border-left-color:var(--b)} .brow.B .bt{color:var(--b)}
  .brow.C{border-left-color:var(--c)} .brow.C .bt{color:var(--c)}
  #hint{height:22px;text-align:center;color:var(--muted);font-size:12px;padding-top:2px;
        user-select:none;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}
</style>
</head>
<body>
  <div id="top"><h1>엔딩 분기</h1></div>
  <div id="stage"><div id="log"></div><div id="hint">▼ 클릭하여 계속</div></div>
<script>
const STORY=[
 {n:`모든 조사와 진상 규명이 끝났습니다. 두 파트에서 경과한 시간을 합산해, 여러분이 맞이할 결말을 확인합니다.`},
 {rules:{t:`⏱ 조사 파트`, b:`한 곳의 탐문 조사(색깔 있는 사각형 칸)마다 5분이 경과합니다.\n조사 플로차트 페이지 왼쪽 아래에 기재된 숫자(조사 횟수) × 5 = 조사에 사용한 시간.\n\n· 최대 18군데 모두 조사 → 90분\n· 최소 7군데(각 1단계 + 경찰에게 요청만) → 35분`}},
 {rules:{t:`🔍 진상 규명 파트`, b:`재조사 대안으로, 한 문제 틀릴 때마다 15분이 경과합니다.\n틀린 문제 수 × 15 = 진상 규명에 사용한 시간.\n\n· 최대 6문제 모두 오답 → 90분\n· 모든 문제 정답 → 0분 (경과 없음)\n· 같은 문제에서 몇 번 틀려도 경과 시간은 늘지 않습니다.`}},
 {rules:{t:`➕ 합산`, b:`두 파트에서 경과한 시간을 합산해 주세요. 아래 분기 조건에 비추어, 여러분이 맞이할 분기를 확인합니다.`}},
 {br:[
   {k:"A", t:"분기 A", d:"합산 시간이 150분 이상", note:"※ 편의상 “150분과 같거나 초과한” 상태로 가정합니다."},
   {k:"B", t:"분기 B", d:"합산 시간이 150분 미만"},
   {k:"C", t:"분기 C", d:"합산 시간이 150분 미만이고, 유키미즈 토오루가 한 번도 [혐오]를 느끼지 못한 경우", note:"※ “기적”이 일어나지 않는 한 볼 수 없는 엔딩."},
 ]},
 {n:`자신의 분기를 확인했다면, 진행자에게 받은 비밀번호로 결말을 열어 주세요.\n(엔딩 A·B·C는 준비 중입니다.)`},
];
const log=document.getElementById('log'), stage=document.getElementById('stage'), hint=document.getElementById('hint');
let i=0, done=false;
function el(t,a){const e=document.createElement(t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function add(n){log.appendChild(n);log.scrollTop=log.scrollHeight;}
function narr(t){const d=el('div',{class:'narr'});d.appendChild(document.createTextNode(t));add(d);}
function rules(o){const d=el('div',{class:'rules'});const tg=el('span',{class:'rtag'});tg.textContent=o.t;d.appendChild(tg);d.appendChild(document.createTextNode(o.b));add(d);}
function branch(rows){const c=el('div',{class:'branch'});rows.forEach(r=>{const row=el('div',{class:'brow '+r.k});
  const bt=el('div',{class:'bt'});bt.textContent='▶ '+r.t;const bd=el('div',{class:'bd'});bd.textContent=r.d;row.appendChild(bt);row.appendChild(bd);
  if(r.note){const nt=el('div',{class:'note'});nt.textContent=r.note;row.appendChild(nt);}c.appendChild(row);});add(c);}
function advance(){
  if(done)return;
  if(i>=STORY.length){done=true;hint.style.display='none';return;}
  const s=STORY[i];i++;
  if(s.n!=null)narr(s.n); else if(s.rules)rules(s.rules); else if(s.br)branch(s.br);
}
stage.addEventListener('click',e=>{if(e.target.closest('button'))return;advance();});
advance();
</script>
</body>
</html>
